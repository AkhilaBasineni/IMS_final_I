{% extends "base.html" %}
{% block content %}

<style>
    .page-header {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border-radius: 20px; padding: 24px 28px; color: white;
        margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .page-header::after {
        content: ''; position: absolute; right: -30px; top: -30px;
        width: 180px; height: 180px; background: rgba(79,70,229,0.15);
        border-radius: 50%; pointer-events: none;
    }
    .page-header::before {
        content: ''; position: absolute; right: 60px; bottom: -50px;
        width: 120px; height: 120px; background: rgba(99,102,241,0.12);
        border-radius: 50%; pointer-events: none;
    }
    .page-header h2 { color: white !important; font-weight: 800; margin-bottom: 4px; }
    .page-header h2 i { opacity: 0.85; }
    .page-header small, .page-header p.sub { color: #94a3b8 !important; font-size: 0.875rem; margin: 0; }
    .page-header .header-action { 
        background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
        border-radius: 12px; padding: 10px 20px; color: white; font-weight: 600;
        font-size: 0.85rem; transition: all 0.3s ease; cursor: pointer;
        display: inline-flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
        position: relative; z-index: 10;
    }
    .page-header .header-action:hover {
        background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5);
        transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        color: white; text-decoration: none;
    }
</style>
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h2 class="mb-1"><i class="bi bi-shield-lock-fill me-2"></i>Security &amp; Audit Logs</h2>
            <p class="sub mb-0">System event trail and security monitoring</p>
        </div>
        <button class="header-action" onclick="loadPageData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 text-muted">Security &amp; Audit Events</h6>
        <small class="text-muted" id="log-count"></small>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action Performed</th>
                    <th>Entity Type</th>
                    <th>Target ID</th>
                </tr>
            </thead>
            <tbody id="log-table">
                <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-secondary"></div></td></tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-center">
        <ul class="pagination pagination-sm mb-0" id="log-pagination"></ul>
    </div>
</div>

<script>
function buildPagination(current, total, loadFn, containerId) {
    if (total <= 1) { document.getElementById(containerId).innerHTML = ''; return; }
    let h = '';
    if (current > 1)  h += `<li class="page-item"><a class="page-link" href="#" onclick="${loadFn}(${current-1});return false;">‹</a></li>`;
    for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || Math.abs(i - current) <= 2) {
            h += `<li class="page-item ${i===current?'active':''}"><a class="page-link" href="#" onclick="${loadFn}(${i});return false;">${i}</a></li>`;
        } else if (Math.abs(i - current) === 3) {
            h += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
        }
    }
    if (current < total) h += `<li class="page-item"><a class="page-link" href="#" onclick="${loadFn}(${current+1});return false;">›</a></li>`;
    document.getElementById(containerId).innerHTML = h;
}

async function loadPageData(page = 1) {
    document.getElementById('log-table').innerHTML =
        '<tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-secondary"></div></td></tr>';
    try {
        const res  = await axios.get(`/api/audit-logs?page=${page}&per_page=20`);
        const data = res.data.data;
        const logs = data.items;

        document.getElementById('log-count').innerText =
            `Page ${data.current_page} of ${data.pages} · ${data.total} total events`;

        if (logs.length === 0) {
            document.getElementById('log-table').innerHTML =
                '<tr><td colspan="5" class="text-center py-4">No audit logs found.</td></tr>';
            document.getElementById('log-pagination').innerHTML = '';
            return;
        }

        document.getElementById('log-table').innerHTML = logs.map(log => `
            <tr>
                <td class="text-muted small">${log.created_at}</td>
                <td><strong>${log.username}</strong></td>
                <td>
                    <span class="badge ${
                        log.action === 'CREATE'   ? 'bg-success' :
                        log.action === 'DELETE'   ? 'bg-danger'  :
                        log.action === 'DEACTIVATE' ? 'bg-warning text-dark' :
                        log.action === 'UPDATE'   ? 'bg-primary' :
                        'bg-info text-dark'
                    }">${log.action}</span>
                </td>
                <td><span class="badge bg-secondary">${log.entity_type}</span></td>
                <td class="font-monospace text-muted">${log.entity_id}</td>
            </tr>
        `).join('');

        buildPagination(data.current_page, data.pages, 'loadPageData', 'log-pagination');
    } catch (e) {
        console.error(e);
        document.getElementById('log-table').innerHTML =
            '<tr><td colspan="5" class="text-center text-danger py-4">Error loading logs. Verify Admin permissions.</td></tr>';
    }
}
</script>
{% endblock %}
